<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let redirectUrl = undefined;
        let pathname = window.location.pathname;
        if(pathname[pathname.length - 1] === '/') pathname = pathname.substr(0, pathname.length - 1);
        switch(pathname) {
            case '/7seg':
                redirectUrl = '/7seg.html';
                break;
        }
        if(redirectUrl) window.location.href = redirectUrl;
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Andreas-Lonn</title>
    <style>
        @import url(/toolstyle.css) layer(toolstyle);

        ul > li > a {
            text-decoration: none;
            padding: 0.2em;
            display: block;
        }
    </style>
</head>
<body>
    <main>
        <h1>404</h1>
        <ul>
            <li><a href="/7seg.html">
                7seg
            </a></li>
        </ul>
        <a href="https://github.com/andreas-lonn/andreas-lonn.github.io">To GitHub</a>
    </main>
</body>
</html>
